<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Resourcing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --surface: #ffffff;
      --bg: #f1f5f9;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --danger: #ef4444;
      --danger-dark: #dc2626;
      --success: #16a34a;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-lg: 0 4px 16px rgba(0,0,0,.10);
    }
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }

    /* NAV */
    nav { background: var(--brand); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; box-shadow: 0 2px 8px rgba(37,99,235,.3); }
    nav .logo { font-weight: 700; font-size: 17px; letter-spacing: -.3px; display: flex; align-items: center; gap: 8px; }
    nav .logo svg { opacity: .9; }
    #authControls button { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.3); color: #fff; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background .15s; }
    #authControls button:hover { background: rgba(255,255,255,.25); }

    /* LAYOUT */
    .page { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

    /* LOGIN */
    #loginCard { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); max-width: 400px; margin: 60px auto; padding: 36px 32px; }
    #loginCard h2 { margin: 0 0 4px; font-size: 20px; }
    #loginCard p { margin: 0 0 24px; color: var(--muted); font-size: 13px; }

    /* CARD */
    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
    .card-title { font-size: 15px; font-weight: 600; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
    .card-title svg { color: var(--brand); }

    /* FORMS */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 20px; }
    .form-grid .span2 { grid-column: span 2; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 5px; }
    input[type=text], input[type=password], input[type=file], select, textarea {
      width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: 7px;
      font-size: 14px; color: var(--text); background: #fff; transition: border .15s, box-shadow .15s;
      outline: none;
    }
    input[type=file] { padding: 6px 10px; }
    input:focus, select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
    input::placeholder { color: #94a3b8; }

    /* BUTTONS */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: background .15s, transform .08s; }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-ghost { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover { background: #e2e8f0; }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid #fecaca; font-size: 12px; padding: 5px 12px; }
    .btn-danger:hover { background: #fef2f2; border-color: var(--danger); }
    .btn-link { background: none; border: none; color: var(--brand); font-weight: 600; font-size: 13px; cursor: pointer; padding: 5px 0; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
    .btn-link:hover { text-decoration: underline; }

    /* FILTER BAR */
    .filter-bar { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto auto; gap: 10px; align-items: end; margin-bottom: 16px; }
    .filter-bar .filter-field label { margin-bottom: 4px; }

    /* CANDIDATE CARDS */
    #candidates { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .candidate-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 8px; background: #fafcff; transition: box-shadow .15s; }
    .candidate-row:hover { box-shadow: 0 2px 8px rgba(37,99,235,.08); border-color: #c7d7f9; }
    .candidate-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #6366f1); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
    .candidate-info { flex: 1; min-width: 0; }
    .candidate-name { font-weight: 600; font-size: 14px; }
    .candidate-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .candidate-skills { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
    .skill-tag { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; border-radius: 4px; font-size: 11px; font-weight: 500; padding: 2px 7px; }
    .candidate-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-junior { background: #dcfce7; color: #166534; }
    .badge-mid { background: #fef3c7; color: #92400e; }
    .badge-senior { background: #ede9fe; color: #5b21b6; }
    .badge-default { background: #f1f5f9; color: #475569; }
    .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px 20px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--brand); line-height: 1; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: .4px; }

    /* CHARTS */
    .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-top: 16px; }
    .chart-box { position: relative; height: 220px; }

    /* TAGS in report */
    .tag-btn { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; margin: 3px 3px 0 0; border: 1px solid var(--border); background: #f8fafc; color: var(--text); transition: background .12s, border-color .12s; }
    .tag-btn:hover { background: #eff6ff; border-color: var(--brand); color: var(--brand); }

    /* MISC */
    .msg { font-size: 12px; margin-left: 8px; }
    .msg-ok { color: var(--success); }
    .msg-err { color: var(--danger); }
    #loginMsg { font-size: 12px; margin-left: 8px; color: var(--danger); }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 28px 28px 24px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .modal-header h3 { margin: 0; font-size: 16px; }
    .modal-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 20px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
    .modal-close:hover { background: var(--bg); color: var(--text); }
    .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

    @media (max-width: 700px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .span2 { grid-column: span 1; }
      .filter-bar { grid-template-columns: 1fr 1fr; }
      .charts-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
      .candidate-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<nav>
  <div class="logo">
    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-5-3.87M9 20H4v-2a4 4 0 015-3.87m6-4.13a4 4 0 11-8 0 4 4 0 018 0zm6-2a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
    Resourcing
  </div>
  <div id="authControls"></div>
</nav>

<!-- LOGIN -->
<div id="loginCard">
  <h2>Sign in</h2>
  <p>Enter your credentials to access the resourcing portal.</p>
  <form id="loginForm">
    <div style="margin-bottom:14px">
      <label for="li_user">Username</label>
      <input id="li_user" name="username" type="text" placeholder="admin" required autocomplete="username">
    </div>
    <div style="margin-bottom:20px">
      <label for="li_pass">Password</label>
      <input id="li_pass" name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center">Sign in</button>
    <span id="loginMsg"></span>
  </form>
</div>

<!-- MAIN -->
<div id="mainUI" style="display:none">
<div class="page">

  <!-- Upload -->
  <div class="card">
    <div class="card-title">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M16 12l-4-4-4 4M12 8v8"/></svg>
      Upload CV
    </div>
    <form id="uploadForm">
      <div class="form-grid">
        <div>
          <label>Candidate name *</label>
          <input name="name" type="text" placeholder="Full name" required>
        </div>
        <div>
          <label>Role</label>
          <input name="role" type="text" placeholder="e.g. Data Engineer">
        </div>
        <div>
          <label>Seniority</label>
          <select name="seniority">
            <option value="">Select level</option>
            <option>Junior</option>
            <option>Mid</option>
            <option>Senior</option>
          </select>
        </div>
        <div>
          <label>Referred by</label>
          <input name="referredBy" type="text" placeholder="Name or source">
        </div>
        <div>
          <label>Availability</label>
          <select name="availability">
            <option value="">Select type</option>
            <option>Freelancer</option>
            <option>Full-time</option>
            <option>Contract</option>
            <option>Part-time</option>
          </select>
        </div>
        <div class="span2">
          <label>Skills (comma separated)</label>
          <input name="skills" type="text" placeholder="e.g. Python, SQL, Azure">
        </div>
        <div class="span2">
          <label>CV file (PDF / DOC / DOCX) *</label>
          <input type="file" name="cv" accept=".pdf,.doc,.docx" required>
        </div>
      </div>
      <div style="margin-top:18px;display:flex;align-items:center">
        <button class="btn btn-primary" type="submit">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M16 12l-4-4-4 4M12 8v8"/></svg>
          Upload
        </button>
        <span id="uploadMsg" class="msg"></span>
      </div>
    </form>
  </div>

  <!-- Candidates -->
  <div class="card">
    <div class="card-title">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-5-3.87M9 20H4v-2a4 4 0 015-3.87m6-4.13a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      Candidates
    </div>
    <div class="filter-bar">
      <div class="filter-field"><label>Name</label><input id="qName" type="text" placeholder="Search name"></div>
      <div class="filter-field"><label>Role</label><input id="qRole" type="text" placeholder="Search role"></div>
      <div class="filter-field"><label>Skill</label><input id="qSkill" type="text" placeholder="Search skill"></div>
      <div class="filter-field"><label>Referred by</label><input id="qReferred" type="text" placeholder="Referrer"></div>
      <div class="filter-field">
        <label>Seniority</label>
        <select id="qSeniority"><option value="">Any</option><option>Junior</option><option>Mid</option><option>Senior</option></select>
      </div>
      <div style="display:flex;gap:8px;padding-bottom:1px">
        <button class="btn btn-primary" id="btnFilter">Search</button>
        <button class="btn btn-ghost" id="clearFilters">Clear</button>
      </div>
    </div>
    <div id="candidates"></div>
  </div>

  <!-- Reports -->
  <div class="card">
    <div class="card-title">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      Reports &amp; Analytics
    </div>
    <div id="statsRow" class="stats-row"></div>
    <div id="report"></div>
    <div class="charts-grid">
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Candidates by Role</div>
        <div class="chart-box"><canvas id="roleChart"></canvas></div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">By Seniority</div>
        <div class="chart-box"><canvas id="seniorityChart"></canvas></div>
      </div>
    </div>
  </div>

</div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="viewModal">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:12px">
        <div id="viewAvatar" class="candidate-avatar" style="width:48px;height:48px;font-size:18px"></div>
        <div>
          <h3 id="viewName" style="margin:0;font-size:18px"></h3>
          <div id="viewRole" style="font-size:13px;color:var(--muted);margin-top:2px"></div>
        </div>
      </div>
      <button class="modal-close" onclick="closeView()">&#x2715;</button>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px 24px">
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Seniority</div>
        <div id="viewSeniority" style="font-size:14px"></div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Availability</div>
        <div id="viewAvailability" style="font-size:14px"></div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Referred by</div>
        <div id="viewReferredBy" style="font-size:14px"></div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Status</div>
        <div id="viewStatus" style="font-size:14px"></div>
      </div>
      <div style="grid-column:span 2">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Skills</div>
        <div id="viewSkills" style="display:flex;flex-wrap:wrap;gap:6px"></div>
      </div>
      <div style="grid-column:span 2">
        <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px">Uploaded</div>
        <div id="viewUploaded" style="font-size:13px;color:var(--muted)"></div>
      </div>
    </div>

    <div class="modal-footer" style="justify-content:space-between">
      <button class="btn btn-danger" id="viewDeleteBtn">Delete</button>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" id="viewEditBtn">Edit</button>
        <button class="btn btn-primary" id="viewDownloadBtn">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m-4-4l4 4 4-4"/></svg>
          Download CV
        </button>
      </div>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3>Edit Candidate</h3>
      <button class="modal-close" onclick="closeEdit()">&#x2715;</button>
    </div>
    <form id="editForm">
      <input type="hidden" id="editId">
      <div class="form-grid">
        <div>
          <label>Candidate name *</label>
          <input id="editName" type="text" required placeholder="Full name">
        </div>
        <div>
          <label>Role</label>
          <input id="editRole" type="text" placeholder="e.g. Data Engineer">
        </div>
        <div>
          <label>Seniority</label>
          <select id="editSeniority">
            <option value="">Select level</option>
            <option>Junior</option>
            <option>Mid</option>
            <option>Senior</option>
          </select>
        </div>
        <div>
          <label>Availability</label>
          <select id="editAvailability">
            <option value="">Select type</option>
            <option>Freelancer</option>
            <option>Full-time</option>
            <option>Contract</option>
            <option>Part-time</option>
          </select>
        </div>
        <div>
          <label>Referred by</label>
          <input id="editReferredBy" type="text" placeholder="Name or source">
        </div>
        <div>
          <label>Status</label>
          <input id="editStatus" type="text" placeholder="e.g. Shortlisted, Interviewed">
        </div>
        <div class="span2">
          <label>Skills (comma separated)</label>
          <input id="editSkills" type="text" placeholder="e.g. Python, SQL, Azure">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeEdit()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save changes</button>
        <span id="editMsg" class="msg"></span>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const el = id => document.getElementById(id);

  /* ── Upload ─────────────────────────────────────────── */
  el('uploadForm').addEventListener('submit', async e => {
    e.preventDefault();
    const msg = el('uploadMsg');
    msg.textContent = 'Uploading…'; msg.className = 'msg';
    const token = localStorage.getItem('token');
    const r = await fetch('/api/upload', { method: 'POST', body: new FormData(e.target), headers: token ? { 'Authorization': 'Bearer ' + token } : undefined });
    const j = await r.json();
    if (j.ok) { msg.textContent = 'Uploaded successfully!'; msg.className = 'msg msg-ok'; loadList(); loadReport(); e.target.reset(); }
    else { msg.textContent = j.error || 'Upload failed'; msg.className = 'msg msg-err'; }
  });

  /* ── Candidate list ─────────────────────────────────── */
  async function loadList() {
    const params = new URLSearchParams();
    const qName = el('qName').value.trim();
    const qRole = el('qRole').value.trim();
    const qSkill = el('qSkill').value.trim();
    const qSen = el('qSeniority').value;
    const qRef = el('qReferred').value.trim();
    if (qName) params.set('name', qName);
    if (qRole) params.set('role', qRole);
    if (qSkill) params.set('skill', qSkill);
    if (qSen) params.set('seniority', qSen);
    if (qRef) params.set('referredBy', qRef);
    const token = localStorage.getItem('token');
    const res = await fetch('/api/candidates?' + params, { headers: token ? { 'Authorization': 'Bearer ' + token } : undefined });
    const j = await res.json();
    const out = el('candidates');
    out.innerHTML = '';
    if (!j.candidates || j.candidates.length === 0) {
      out.innerHTML = '<div class="empty-state">No candidates found matching your filters.</div>';
      return;
    }
    j.candidates.forEach(c => {
      const initials = (c.name || '?').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
      const sen = (c.seniority || '').toLowerCase();
      const badgeClass = sen === 'junior' ? 'badge-junior' : sen === 'mid' ? 'badge-mid' : sen === 'senior' ? 'badge-senior' : 'badge-default';
      const avail = c.availability || '';
      const skills = (c.skills || []).map(s => `<span class="skill-tag">${escHtml(s)}</span>`).join('');
      const row = document.createElement('div');
      row.className = 'candidate-row';
      row.innerHTML = `
        <div class="candidate-avatar">${escHtml(initials)}</div>
        <div class="candidate-info" style="cursor:pointer" onclick='openView(${JSON.stringify(c)})'>
          <div class="candidate-name" style="color:var(--brand)">${escHtml(c.name)}</div>
          <div class="candidate-meta">${escHtml(c.role || '—')}${c.referredby ? ' &nbsp;·&nbsp; Ref: ' + escHtml(c.referredby) : ''}</div>
          ${skills ? '<div class="candidate-skills">' + skills + '</div>' : ''}
        </div>
        <div class="candidate-actions">
          ${avail ? `<span class="badge badge-default" style="background:#f0fdf4;color:#166534;border:1px solid #bbf7d0">${escHtml(avail)}</span>` : ''}
          ${c.seniority ? `<span class="badge ${badgeClass}">${escHtml(c.seniority)}</span>` : ''}
          <button class="btn-link" onclick="downloadCV('${c.filename.replace(/'/g, "\\'")}')">
            <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M12 4v12m-4-4l4 4 4-4"/></svg>
            CV
          </button>
          <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick='openEdit(${JSON.stringify(c)})'>Edit</button>
          <button class="btn btn-danger" onclick="deleteCV('${c.id}')">Delete</button>
        </div>`;
      out.appendChild(row);
    });
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setFilter(field, value) {
    if (field === 'role') el('qRole').value = value;
    if (field === 'seniority') el('qSeniority').value = value;
    loadList();
  }

  el('btnFilter').addEventListener('click', e => { e.preventDefault(); loadList(); });
  el('clearFilters').addEventListener('click', () => {
    ['qName','qRole','qSkill','qSeniority','qReferred'].forEach(id => el(id).value = '');
    loadList();
  });

  /* ── Download ───────────────────────────────────────── */
  async function downloadCV(filename) {
    try {
      const token = localStorage.getItem('token');
      const resp = await fetch('/cv/' + encodeURIComponent(filename), { headers: token ? { 'Authorization': 'Bearer ' + token } : undefined });
      if (!resp.ok) { alert('Download failed: ' + resp.status); return; }
      const data = await resp.json();
      if (data.url) {
        const a = document.createElement('a'); a.href = data.url; a.target = '_blank'; a.download = filename;
        document.body.appendChild(a); a.click(); a.remove();
      } else {
        const blob = await (await fetch('/cv/' + encodeURIComponent(filename) + '?dl=1')).blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = filename;
        document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
      }
    } catch (err) { alert('Download error: ' + err.message); }
  }

  /* ── Delete ─────────────────────────────────────────── */
  async function deleteCV(id) {
    if (!confirm('Delete this candidate and their CV?')) return;
    const token = localStorage.getItem('token');
    const r = await fetch('/api/candidates/' + encodeURIComponent(id), { method: 'DELETE', headers: token ? { 'Authorization': 'Bearer ' + token } : undefined });
    if (!r.ok) { alert('Delete failed'); return; }
    loadList(); loadReport();
  }

  /* ── Report / Charts ────────────────────────────────── */
  let roleChart = null, seniorityChart = null;
  async function loadReport() {
    const token = localStorage.getItem('token');
    const r = await fetch('/api/report', { headers: token ? { 'Authorization': 'Bearer ' + token } : undefined });
    if (!r.ok) return;
    const j = await r.json();
    const total = j.total || 0;
    const roleKeys = Object.keys(j.byRole || {});
    const senKeys = Object.keys(j.bySeniority || {});

    // stats
    el('statsRow').innerHTML = `
      <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Candidates</div></div>
      <div class="stat-card"><div class="stat-value">${roleKeys.length}</div><div class="stat-label">Distinct Roles</div></div>
      <div class="stat-card"><div class="stat-value">${(j.bySeniority || {}).Senior || 0}</div><div class="stat-label">Senior Candidates</div></div>`;

    // clickable tag lists
    const elr = el('report');
    elr.innerHTML = '';
    function renderTags(title, buckets, field) {
      const keys = Object.keys(buckets).sort((a,b) => buckets[b] - buckets[a]);
      const div = document.createElement('div'); div.style.marginBottom = '10px';
      div.innerHTML = `<div style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">${title}</div>`;
      keys.forEach(k => {
        const btn = document.createElement('button'); btn.className = 'tag-btn';
        btn.textContent = `${k}  ${buckets[k]}`; btn.addEventListener('click', () => setFilter(field, k));
        div.appendChild(btn);
      });
      return div;
    }
    if (roleKeys.length) elr.appendChild(renderTags('Roles', j.byRole, 'role'));
    if (senKeys.length) elr.appendChild(renderTags('Seniority', j.bySeniority, 'seniority'));

    // charts
    if (roleChart) roleChart.destroy();
    if (seniorityChart) seniorityChart.destroy();
    const roleData = roleKeys.map(l => j.byRole[l]);
    const senData = senKeys.map(l => j.bySeniority[l]);

    roleChart = new Chart(el('roleChart').getContext('2d'), {
      type: 'bar',
      data: { labels: roleKeys, datasets: [{ label: 'Candidates', data: roleData, backgroundColor: '#3b82f6', borderRadius: 5, borderSkipped: false }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, onClick: (evt, elems) => { if (elems.length) setFilter('role', roleKeys[elems[0].index]); }, scales: { y: { beginAtZero: true, ticks: { precision: 0 }, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } } }
    });

    seniorityChart = new Chart(el('seniorityChart').getContext('2d'), {
      type: 'doughnut',
      data: { labels: senKeys, datasets: [{ data: senData, backgroundColor: ['#3b82f6','#f59e0b','#8b5cf6'], borderWidth: 0, hoverOffset: 6 }] },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 12 }, padding: 12 } } }, onClick: (evt, elems) => { if (elems.length) setFilter('seniority', senKeys[elems[0].index]); } }
    });
  }

  /* ── View modal ─────────────────────────────────────── */
  let _viewCandidate = null;

  function openView(c) {
    _viewCandidate = c;
    const initials = (c.name || '?').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
    el('viewAvatar').textContent = initials;
    el('viewName').textContent = c.name || '';
    el('viewRole').textContent = c.role || '—';
    const sen = (c.seniority || '').toLowerCase();
    const badgeClass = sen === 'junior' ? 'badge-junior' : sen === 'mid' ? 'badge-mid' : sen === 'senior' ? 'badge-senior' : 'badge-default';
    el('viewSeniority').innerHTML = c.seniority ? `<span class="badge ${badgeClass}">${escHtml(c.seniority)}</span>` : '<span style="color:var(--muted)">—</span>';
    el('viewAvailability').innerHTML = c.availability ? `<span class="badge" style="background:#f0fdf4;color:#166534;border:1px solid #bbf7d0">${escHtml(c.availability)}</span>` : '<span style="color:var(--muted)">—</span>';
    el('viewReferredBy').textContent = c.referredby || '—';
    el('viewStatus').textContent = c.status || '—';
    el('viewSkills').innerHTML = (c.skills || []).map(s => `<span class="skill-tag">${escHtml(s)}</span>`).join('') || '<span style="color:var(--muted)">—</span>';
    el('viewUploaded').textContent = c.uploaded_at ? new Date(c.uploaded_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : '—';
    el('viewDownloadBtn').onclick = () => downloadCV(c.filename);
    el('viewEditBtn').onclick = () => { closeView(); openEdit(c); };
    el('viewDeleteBtn').onclick = () => { closeView(); deleteCV(c.id); };
    el('viewModal').classList.add('open');
  }

  function closeView() { el('viewModal').classList.remove('open'); }
  el('viewModal').addEventListener('click', e => { if (e.target === el('viewModal')) closeView(); });

  /* ── Edit modal ─────────────────────────────────────── */
  function openEdit(c) {
    el('editId').value = c.id;
    el('editName').value = c.name || '';
    el('editRole').value = c.role || '';
    el('editSeniority').value = c.seniority || '';
    el('editAvailability').value = c.availability || '';
    el('editReferredBy').value = c.referredby || '';
    el('editStatus').value = c.status || '';
    el('editSkills').value = (c.skills || []).join(', ');
    el('editMsg').textContent = '';
    el('editModal').classList.add('open');
  }

  function closeEdit() {
    el('editModal').classList.remove('open');
  }

  el('editModal').addEventListener('click', e => { if (e.target === el('editModal')) closeEdit(); });

  el('editForm').addEventListener('submit', async e => {
    e.preventDefault();
    const msg = el('editMsg');
    msg.textContent = 'Saving…'; msg.className = 'msg';
    const token = localStorage.getItem('token');
    const id = el('editId').value;
    const body = {
      name: el('editName').value.trim(),
      role: el('editRole').value.trim(),
      seniority: el('editSeniority').value,
      availability: el('editAvailability').value,
      referredBy: el('editReferredBy').value.trim(),
      status: el('editStatus').value.trim(),
      skills: el('editSkills').value
    };
    const r = await fetch('/api/candidates/' + encodeURIComponent(id), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) },
      body: JSON.stringify(body)
    });
    const j = await r.json();
    if (j.ok) { closeEdit(); loadList(); loadReport(); }
    else { msg.textContent = j.error || 'Save failed'; msg.className = 'msg msg-err'; }
  });

  /* ── Auth ───────────────────────────────────────────── */
  function showApp() { el('loginCard').style.display = 'none'; el('mainUI').style.display = 'block'; updateAuthControls(true); loadList(); loadReport(); }
  function showLogin() { el('loginCard').style.display = 'block'; el('mainUI').style.display = 'none'; updateAuthControls(false); }

  function updateAuthControls(loggedIn) {
    const c = el('authControls'); c.innerHTML = '';
    if (loggedIn) {
      const btn = document.createElement('button'); btn.textContent = 'Logout'; btn.addEventListener('click', () => { localStorage.removeItem('token'); showLogin(); }); c.appendChild(btn);
    }
  }

  el('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    el('loginMsg').textContent = '';
    const r = await fetch('/api/login', { method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify({ username: fd.get('username'), password: fd.get('password') }) });
    const j = await r.json();
    if (r.ok && j.token) { localStorage.setItem('token', j.token); showApp(); }
    else { el('loginMsg').textContent = 'Invalid username or password'; }
  });

  // auto-login if token still valid
  showLogin();
  (async () => {
    const token = localStorage.getItem('token');
    if (!token) return;
    const r = await fetch('/api/report', { headers: { 'Authorization': 'Bearer ' + token } });
    if (r.ok) showApp();
  })();
</script>
</body>
</html>
